site_name: vsp — AI-Agentic ABAP Development
site_description: MCP server bridging AI assistants (Claude, Gemini, Copilot…) with SAP ABAP Development Tools
site_url: https://oisee.github.io/vibing-steampunk/
repo_url: https://github.com/oisee/vibing-steampunk
repo_name: oisee/vibing-steampunk
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: getting-started.md
    - Configuration: configuration.md
    - CLI Agents: cli-agents/README.md
    - Changelog: changelog.md
  - Tools:
    - Overview: tools/index.md
    - Tool Reference: tools/reference.md
  - Features:
    - ABAP Debugger: features/debugging.md
    - RAP / OData E2E: features/rap-odata.md
    - ExecuteABAP: features/execute-abap.md
    - abapGit Integration: features/abapgit.md
    - Safety Controls: features/safety.md
    - Transport Management: features/transport.md
  - DSL & Workflows: DSL.md
  - Developer:
    - Architecture: architecture.md
    - Architecture Decisions:
      - WebSocket Debugging: adr/001-websocket-stateful-debugging.md
      - RCA Tooling: adr/002-rca-tooling-architecture.md
      - ZADT_VSP Handler: adr/003-zadt-vsp-apc-unified-handler.md
